<head>

<body>

        <div class="nav-desktop" id="nav-desktop"></div>
        <div class="nav-mobile" id="nav-mobile"></div>

        <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </header>

    <div id="app"></div>

    <footer>
        <p>© Pending - Team 2 Get Academy</p>
    </footer>

    <script src="Model/model.js"></script>

    <script src="View/Add_Or_Edit_New_Music/view.js"></script>
    <script src="View/Homepage/view.js"></script>
    <script src="View/Login/view.js"></script>
    <script src="View/Music_Details/view.js"></script>
    <script src="View/Profile/view.js"></script>
    <script src="View/Register/view.js"></script>
    <script src="View/Search/view.js"></script>
    <script src="View/Wishlist/view.js"></script>
    <script src="View/Universal/albumCard.js"></script>

    <script src="Controller/Edit_Music_Details/editMusic.js"></script>
    <script src="Controller/Login/login.js"></script>
    <script src="Controller/Music_Details/editBtn.js"></script>
    <script src="Controller/Register/register.js"></script>

    <script src="Controller/Universal/save.js"></script>
    <script src="Controller/Universal/viewMusicDetails.js"></script>

    <script src="View/Universal/updateView.js"></script>

    <script>
        function applyTheme(theme) {
            const html = document.documentElement;
            const normalizedTheme = theme === 'light' ? 'light' : 'dark';
            html.setAttribute('data-theme', normalizedTheme);
            const themeBtn = document.getElementById('themeBtn');
            if (themeBtn) {
                themeBtn.textContent = normalizedTheme === 'light' ? '☀️' : '🌙';
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem(APP_THEME_KEY) || 'dark';
            applyTheme(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem(APP_THEME_KEY, nextTheme);
            applyTheme(nextTheme);
        }

        loadTheme();
        initializeApp();
    </script>
</body>

</html>
